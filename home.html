<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Online Book Store</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: "Poppins", sans-serif;
        }

        body{
            min-height:100vh;
            background: linear-gradient(135deg,#1d2671,#c33764);
            color:white;
        }

        /* ===== NAVBAR ===== */
        .navbar{
            position: sticky;
            top: 0;
            width: 100%;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(14px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 100;
        }

        .logo{
            font-size: 20px;
            font-weight: 600;
            color: #ffeb3b;
        }

        .nav-links a{
            margin-left: 18px;
            color: #ffd180;
            text-decoration: none;
            font-weight: 500;
        }

        .nav-links a:hover{
            color: white;
        }

        /* ===== CENTER CONTENT ===== */
        .page{
            min-height: calc(100vh - 80px);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .home-box{
            max-width: 600px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        .home-box h1{
            font-size: 32px;
            margin-bottom: 15px;
        }

        .home-box p{
            font-size: 16px;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .btn{
            display: inline-block;
            padding: 12px 28px;
            margin: 10px;
            border-radius: 30px;
            background: linear-gradient(to right,#ff9800,#ff5722);
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: .3s;
        }

        .btn:hover{
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255,87,34,.5);
        }
          /* ===== FLOATING BACKGROUND ===== */
        .circles span{
            position:absolute;
            bottom:-150px;
            width:60px;
            height:60px;
            background:rgba(255,255,255,0.15);
            border-radius:50%;
            animation: float 20s linear infinite;
        }

        .circles span:nth-child(1){left:10%;width:80px;height:80px;}
        .circles span:nth-child(2){left:30%;animation-duration:18s;}
        .circles span:nth-child(3){left:50%;width:100px;height:100px;}
        .circles span:nth-child(4){left:70%;}
        .circles span:nth-child(5){left:90%;width:70px;height:70px;}

        @keyframes float{
            0%{transform:translateY(0);opacity:1;}
            100%{transform:translateY(-1200px);opacity:0;}
        }
    </style>
</head>

<body>

<div class="circles">
    <span></span><span></span><span></span><span></span><span></span>
</div> 
<!-- ===== NAVBAR ===== -->
<div class="navbar">
    <div class="logo">📚 Online Book Store</div>
    <div class="nav-links">
        <a href="home.html">Home</a>
        <a href="view-books.html"> View Books</a>
        <a href="books.html">Add Books</a>
          <a href="about.html">About Us</a>
        <a href="contact.html">Contact</a>
        <a href="index.html">Logout</a>
    </div>
</div>

<!-- ===== HOME CENTER CONTENT ===== -->
<div class="page">
    <div class="home-box">
        <h1>Welcome to Online Book Store</h1>
        <p>
            Explore a wide range of books, discover new authors,
            and enjoy reading anytime, anywhere.
        </p>

        <a href="view-books.html".html" class="btn">Browse Books</a>
        <a href="contact.html" class="btn">Contact Us</a>
    </div>
</div>

<!-- ===== LOGIN CHECK ===== -->
<script>
    if (!localStorage.getItem("loggedInUser")) {
        window.location.href = "login.html";
    }
</script>

</body>
</html>
