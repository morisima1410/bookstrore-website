<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us | Online Book Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: "Poppins", sans-serif;
        }

        body{
            min-height:100vh;
            background: linear-gradient(135deg,#1d2671,#c33764);
            color:white;
            overflow:hidden;
        }

        /* ===== FLOATING CIRCLES ===== */
        .circles span{
            position:absolute;
            bottom:-150px;
            width:60px;
            height:60px;
            background:rgba(255,255,255,0.15);
            border-radius:50%;
            animation: float 20s linear infinite;
        }

        .circles span:nth-child(1){left:10%;width:80px;height:80px;}
        .circles span:nth-child(2){left:30%;animation-duration:18s;}
        .circles span:nth-child(3){left:50%;width:100px;height:100px;}
        .circles span:nth-child(4){left:70%;}
        .circles span:nth-child(5){left:90%;width:70px;height:70px;}

        @keyframes float{
            0%{transform:translateY(0);opacity:1;}
            100%{transform:translateY(-1200px);opacity:0;}
        }

        /* ===== NAVBAR (SAME AS HOME) ===== */
        .navbar{
            position:sticky;
            top:0;
            width:100%;
            padding:15px 30px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(14px);
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
            z-index:100;
        }

        .logo{
            font-size:20px;
            font-weight:600;
            color:#ffeb3b;
        }

        .nav-links a{
            margin-left:18px;
            color:#ffd180;
            text-decoration:none;
            font-weight:500;
        }

        .nav-links a:hover{
            color:white;
        }

        /* ===== PAGE CENTER ===== */
        .page{
            min-height:calc(100vh - 80px);
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
            z-index:2;
            position:relative;
        }

        /* ===== CONTACT BOX ===== */
        .contact-box{
            width:100%;
            max-width:600px;
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(12px);
            padding:40px;
            border-radius:18px;
            box-shadow:0 25px 50px rgba(0,0,0,0.4);
            text-align:center;
        }

        .contact-box h1{
            margin-bottom:10px;
        }

        .contact-box p{
            color:#ddd;
            margin-bottom:25px;
        }

        .input-box{
            margin-bottom:15px;
        }

        .input-box input,
        .input-box textarea{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            outline:none;
            font-size:14px;
        }

        textarea{
            resize:none;
            height:120px;
        }

        .btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:30px;
            background:linear-gradient(to right,#ff9800,#ff5722);
            color:white;
            font-weight:600;
            font-size:15px;
            cursor:pointer;
            transition:.3s;
        }

        .btn:hover{
            transform:translateY(-2px);
            box-shadow:0 10px 25px rgba(255,87,34,.5);
        }

        .contact-info{
            margin-top:25px;
            font-size:14px;
            color:#ddd;
        }
    </style>
</head>

<body>

<!-- FLOATING BACKGROUND -->

<div class="circles">
    <span></span><span></span><span></span><span></span><span></span>
</div>
<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">📚 Online Book Store</div>
    <div class="nav-links">
        <a href="home.html">Home</a>
        <a href="home.html">Home</a>
        <a href="view-books.html"> View Books</a>
        <a href="books.html">Add Books</a>
          <a href="about.html">About Us</a>
        <a href="contact.html">Contact</a>
        <a href="index.html">Logout</a>
    </div>
</div>

<!-- CONTACT CONTENT -->
<div class="page">
    <div class="contact-box">
        <h1>Contact Us</h1>
        <p>Have a question or feedback? We'd love to hear from you!</p>

        <form>
            <div class="input-box">
                <input type="text" placeholder="Your Name" required>
            </div>

            <div class="input-box">
                <input type="email" placeholder="Your Email" required>
            </div>

            <div class="input-box">
                <textarea placeholder="Your Message" required></textarea>
            </div>

            <button class="btn" type="submit">Send Message</button>
        </form>

        <div class="contact-info">
            📧 morisima1410@gmail.com <br>
            📞 +91 9426544602
        </div>
    </div>
</div>

</body>
</html>
