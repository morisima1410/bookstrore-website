<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome | Online Book Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:"Poppins", sans-serif;
        }

        body{
            min-height:100vh;
            background: linear-gradient(135deg,#1d2671,#c33764);
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
            color:white;
        }

        /* ===== FLOATING BACKGROUND ===== */
        .circles span{
            position:absolute;
            bottom:-150px;
            width:60px;
            height:60px;
            background:rgba(255,255,255,0.15);
            border-radius:50%;
            animation: float 20s linear infinite;
        }

        .circles span:nth-child(1){left:10%;width:80px;height:80px;}
        .circles span:nth-child(2){left:30%;animation-duration:18s;}
        .circles span:nth-child(3){left:50%;width:100px;height:100px;}
        .circles span:nth-child(4){left:70%;}
        .circles span:nth-child(5){left:90%;width:70px;height:70px;}

        @keyframes float{
            0%{transform:translateY(0);opacity:1;}
            100%{transform:translateY(-1200px);opacity:0;}
        }

        /* ===== WELCOME BOX ===== */
        .box{
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(12px);
            padding:50px 70px;
            border-radius:22px;
            text-align:center;
            box-shadow:0 25px 50px rgba(0,0,0,0.4);
            z-index:2;
        }

        .box h1{
            font-size:3rem;
            margin-bottom:10px;
        }

        .box p{
            font-size:1.2rem;
            margin-bottom:30px;
            color:#ddd;
        }

        .btn{
            display:inline-block;
            padding:14px 36px;
            border-radius:30px;
            background:linear-gradient(to right,#ff9800,#ff5722);
            color:white;
            font-weight:600;
            text-decoration:none;
            transition:.3s;
        }

        .btn:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 25px rgba(255,87,34,.5);
        }

        @media(max-width:600px){
            .box{
                padding:40px 30px;
            }
            .box h1{
                font-size:2.2rem;
            }
            .box p{
                font-size:1rem;
            }
        }
    </style>
</head>

<body>


<div class="circles">
    <span></span><span></span><span></span><span></span><span></span>
</div>

<!-- WELCOME CONTENT -->
<div class="box">
    <h1>📚 Online Book Store</h1>
    <p>Read • Learn • Grow</p>
    <a href="register.html" class="btn">Get Started</a>
</div>

</body>
</html>
